<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProjectHub - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <h1>📋 ProjectHub</h1>
    <div class="nav-links">
      <a href="/">Home</a>
    </div>
  </nav>

  <div class="auth-container">

    <!-- Login Form -->
    <div class="auth-box" id="login-box">
      <h2>🔐 Login</h2>
      <input type="email" id="login-email" placeholder="Enter Email" />
      <input type="password" id="login-password" placeholder="Enter Password" />
      <button onclick="login()">Login</button>
      <p>Don't have account? <a href="#" onclick="showRegister()">Register here</a></p>
      <p id="login-msg" style="color:red"></p>
    </div>

    <!-- Register Form -->
    <div class="auth-box" id="register-box" style="display:none">
      <h2>📝 Register</h2>
      <input type="text" id="reg-name" placeholder="Enter Name" />
      <input type="email" id="reg-email" placeholder="Enter Email" />
      <input type="password" id="reg-password" placeholder="Enter Password" />
      <button onclick="register()">Register</button>
      <p>Already have account? <a href="#" onclick="showLogin()">Login here</a></p>
      <p id="reg-msg" style="color:green"></p>
    </div>

  </div>

  <script>
    function showRegister() {
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('register-box').style.display = 'block';
    }

    function showLogin() {
      document.getElementById('register-box').style.display = 'none';
      document.getElementById('login-box').style.display = 'block';
    }

    async function login() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (data.token) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('name', data.name);
        localStorage.setItem('userId', data.userId);
        alert('Login successful! Welcome ' + data.name);
        window.location.href = '/';
      } else {
        document.getElementById('login-msg').innerText = data.message;
      }
    }

    async function register() {
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;

      const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });

      const data = await res.json();
      document.getElementById('reg-msg').innerText = data.message;
      setTimeout(() => { showLogin(); }, 1500);
    }
  </script>

</body>
</html>
