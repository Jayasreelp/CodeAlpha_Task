<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialApp - Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <h1>📱 SocialApp</h1>
    <div class="nav-links">
      <span id="username-display"></span>
      <a href="/profile">👤 Profile</a>
      <a href="/login" id="login-btn">Login</a>
      <a href="#" id="logout-btn" onclick="logout()" style="display:none">Logout</a>
    </div>
  </nav>

  <div class="main-container">

    <!-- Create Post -->
    <div class="create-post" id="create-post-box" style="display:none">
      <h3>Create Post</h3>
      <textarea id="post-text" placeholder="What's on your mind?"></textarea>
      <button onclick="createPost()">Post 🚀</button>
    </div>

    <!-- Posts Feed -->
    <div id="posts-feed"></div>

  </div>

  <script>
    const token = localStorage.getItem('token');
    const name = localStorage.getItem('name');
    const userId = localStorage.getItem('userId');

    // Check login
    if (token) {
      document.getElementById('username-display').innerText = 'Hi, ' + name;
      document.getElementById('login-btn').style.display = 'none';
      document.getElementById('logout-btn').style.display = 'inline';
      document.getElementById('create-post-box').style.display = 'block';
    }

    // Load posts
    async function loadPosts() {
      const res = await fetch('/posts');
      const posts = await res.json();
      const feed = document.getElementById('posts-feed');
      feed.innerHTML = '';

      if (posts.length === 0) {
        feed.innerHTML = '<p style="text-align:center;color:#666;margin-top:30px">No posts yet! Be the first to post! 🎉</p>';
        return;
      }

      posts.forEach(post => {
        const liked = post.likes.includes(userId);
        feed.innerHTML += `
          <div class="post-card">
            <div class="post-header">
              <span class="post-author">👤 ${post.author}</span>
              <span class="post-date">${new Date(post.date).toLocaleDateString()}</span>
            </div>
            <p class="post-text">${post.text}</p>
            <div class="post-actions">
              <button onclick="likePost('${post._id}')" class="like-btn ${liked ? 'liked' : ''}">
                ❤️ ${post.likes.length} Likes
              </button>
            </div>
            <div class="comments-section">
              <h4>Comments (${post.comments.length})</h4>
              ${post.comments.map(c => `
                <div class="comment">
                  <strong>${c.author}:</strong> ${c.text}
                </div>
              `).join('')}
              ${token ? `
                <div class="add-comment">
                  <input type="text" id="comment-${post._id}" placeholder="Add a comment..." />
                  <button onclick="addComment('${post._id}')">Post</button>
                </div>
              ` : ''}
            </div>
          </div>
        `;
      });
    }

    // Create post
    async function createPost() {
      const text = document.getElementById('post-text').value;
      if (!text) return alert('Please write something!');

      await fetch('/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, author: name, authorId: userId })
      });

      document.getElementById('post-text').value = '';
      loadPosts();
    }

    // Like post
    async function likePost(postId) {
      if (!token) return alert('Please login to like!');
      await fetch(`/posts/${postId}/like`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId })
      });
      loadPosts();
    }

    // Add comment
    async function addComment(postId) {
      const text = document.getElementById(`comment-${postId}`).value;
      if (!text) return;
      await fetch(`/posts/${postId}/comment`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, author: name })
      });
      loadPosts();
    }

    // Logout
    function logout() {
      localStorage.clear();
      location.reload();
    }

    loadPosts();
  </script>

</body>
</html>
